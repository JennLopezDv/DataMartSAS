version: '3.8'

x-airflow-common:
  &airflow-common
  image: apache/airflow:2.10.0
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres-airflow:5432/${AIRFLOW_DB_NAME}
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
    _PIP_ADDITIONAL_REQUIREMENTS: apache-airflow-providers-postgres pandas sqlalchemy psycopg2-binary openpyxl
    _PIP_ADDITIONAL_REQUIREMENTS: apache-airflow-providers-postgres pandas sqlalchemy psycopg2-binary openpyxl pyarrow
  
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./data:/opt/airflow/data
    - ./scripts:/opt/airflow/scripts
  depends_on:
    postgres-airflow:
      condition: service_healthy

services:

  postgres-airflow:
    image: postgres:16
    container_name: postgres-airflow
    restart: always
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
    ports:
      - "6433:5432"
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AIRFLOW_DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    restart: on-failure
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate

        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname ${AIRFLOW_ADMIN_FIRSTNAME} \
          --lastname ${AIRFLOW_ADMIN_LASTNAME} \
          --role Admin \
          --email ${AIRFLOW_ADMIN_EMAIL} || true

        airflow connections delete postgres_dw || true

        airflow connections add postgres_dw \
          --conn-type postgres \
          --conn-host ${POSTGRES_HOST} \
          --conn-login ${POSTGRES_USER} \
          --conn-password ${POSTGRES_PASSWORD} \
          --conn-port ${POSTGRES_PORT} \
          --conn-schema ${POSTGRES_DB}

        airflow variables set SOURCE_FILE_1 "/opt/airflow/data/data.csv"
        airflow variables set SOURCE_FILE_2 "/opt/airflow/data/online_retail_II.xlsx"
        airflow variables set DEFAULT_CATEGORY "UNCLASSIFIED"

    depends_on:
      postgres-airflow:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: always
    depends_on:          # ← sobreescribe el anchor, solo espera airflow-init
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: always
    depends_on:          
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_airflow_data: